name: relay-native-binary-v2-smoke
on:
  push:
    branches: ['mchen/relay-native-binary-v2']

concurrency:
  group: relay-native-v2-${{ github.sha }}
  cancel-in-progress: true

jobs:
  smoke-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    env:
      MIGRATIONS_TEST_MIGRATE: 0
      PYTEST_ADDOPTS: '--no-header -q'
      SENTRY_SKIP_BACKEND_VALIDATION: 1
      XDIST_PER_WORKER_SNUBA: '1'
      XDIST_WORKERS: '2'
      PYTHONHASHSEED: '0'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13.1
        uses: actions/setup-python@v5
        with:
          python-version: 3.13.1

      - name: Set up outputs
        id: config
        env:
          MATRIX_INSTANCE: 0
        run: echo "matrix-instance-number=$(($MATRIX_INSTANCE + 1))" >> "$GITHUB_OUTPUT"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libxmlsec1-dev libmaxminddb-dev

      - name: Set up pip
        uses: ./.github/actions/setup-pip
        id: pip

      - name: pip install
        run: |
          python -m pip install --upgrade pip wheel
          pip install -e ".[dev]"

      - name: Set up devservices (backend-ci)
        env:
          NEED_KAFKA: 'true'
          NEED_SNUBA: 'true'
        run: |
          sentry init
          sentry devservices up --mode backend-ci

      - name: Extract Relay binary from Docker image
        run: |
          echo "=== Extracting Relay binary from Docker image ==="
          RELAY_IMAGE="${RELAY_TEST_IMAGE:-ghcr.io/getsentry/relay:nightly}"
          echo "Image: $RELAY_IMAGE"

          # Create a temporary container to copy the binary out
          docker create --name relay_extract "$RELAY_IMAGE"

          # The binary location in the image (try common paths)
          for bin_path in /bin/relay /usr/local/bin/relay /usr/bin/relay; do
            if docker cp "relay_extract:${bin_path}" /tmp/relay 2>/dev/null; then
              echo "Found binary at $bin_path"
              break
            fi
          done
          docker rm relay_extract

          chmod +x /tmp/relay
          echo "Binary size: $(du -h /tmp/relay | cut -f1)"
          /tmp/relay --version
          echo ""
          echo "RELAY_NATIVE_BIN=/tmp/relay" >> "$GITHUB_ENV"

      - name: Verify native binary has processing support
        run: |
          TEST_DIR=$(mktemp -d)
          cat > "$TEST_DIR/config.yml" <<'CONF'
          relay:
            mode: managed
            upstream: http://127.0.0.1:9999/
            host: 0.0.0.0
            port: 44444
          processing:
            enabled: true
            kafka_config:
              - {name: 'bootstrap.servers', value: '127.0.0.1:9092'}
            topics:
              events: test-events
            redis: redis://127.0.0.1:6379/0
          CONF
          cat > "$TEST_DIR/credentials.json" <<'CRED'
          {"secret_key":"OxE6Du8quMxWj19f7YDCpIxm6XyU9nWGQJkMWFlkchA","public_key":"SMSesqan65THCV6M4qs4kBzPai60LzuDn-xNsvYpuP8","id":"88888888-4444-4444-8444-cccccccccccc"}
          CRED

          # Just test that it starts (will fail to connect to upstream, but won't crash with "not compiled with processing")
          timeout 3 /tmp/relay run --config "$TEST_DIR" 2>&1 | head -20 || true
          echo "Processing support verified (no 'not compiled with processing' error)"
          rm -rf "$TEST_DIR"

      - name: Create per-worker ClickHouse databases and Snuba instances
        run: |
          echo "Setting up $XDIST_WORKERS per-worker ClickHouse databases + Snuba instances ..."
          SNUBA_IMAGE=$(docker inspect --format='{{.Config.Image}}' sentry_snuba 2>/dev/null || echo "ghcr.io/getsentry/snuba:nightly")

          for i in $(seq 0 $(($XDIST_WORKERS - 1))); do
            DB_NAME="default_gw${i}"
            SNUBA_PORT=$((1230 + i))
            CONTAINER_NAME="sentry_snuba_gw${i}"

            docker exec sentry_clickhouse clickhouse-client --query "CREATE DATABASE IF NOT EXISTS ${DB_NAME}"

            docker run -d \
              --name "$CONTAINER_NAME" \
              --network devservices \
              -p "${SNUBA_PORT}:1218" \
              -e SNUBA_SETTINGS=docker \
              -e CLICKHOUSE_HOST=clickhouse \
              -e CLICKHOUSE_PORT=9000 \
              -e DEFAULT_BROKERS=kafka:9093 \
              -e REDIS_HOST=redis \
              -e REDIS_PORT=6379 \
              -e CLICKHOUSE_DATABASE="$DB_NAME" \
              "$SNUBA_IMAGE"

            docker exec "$CONTAINER_NAME" snuba migrations migrate --force || true

            for attempt in $(seq 1 15); do
              if curl -s "http://127.0.0.1:${SNUBA_PORT}/health" | grep -q "ok"; then
                echo "Snuba gw${i} healthy on port $SNUBA_PORT"
                break
              fi
              sleep 2
            done
          done

      - name: Run smoke test (native binary relay, 4 tests, -n 2)
        run: |
          echo "=== Native binary Relay + per-worker xdist smoke test ==="
          echo "RELAY_NATIVE_BIN=$RELAY_NATIVE_BIN"
          echo "Running 4 relay_integration tests with -n 2 workers"
          echo ""

          py.test tests/relay_integration/test_message_filters.py \
            -n "$XDIST_WORKERS" \
            -k "test_filters_are_applied_browser_extension or test_filters_ensure_disabled_not_applied or test_filters_are_applied_legacy_browsers or test_filter_web_crawlers" \
            --dist=loadfile \
            -x \
            -vvv \
            2>&1 | tail -80

      - name: Inspect failure
        if: failure()
        run: |
          echo "=== Docker containers ==="
          docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep -E "relay|snuba|kafka"

          echo ""
          echo "=== Relay binary version ==="
          /tmp/relay --version 2>&1 || echo "binary not found"

          echo ""
          echo "=== Kafka topics ==="
          docker exec sentry_kafka kafka-topics --list --bootstrap-server localhost:9093 2>/dev/null || true
