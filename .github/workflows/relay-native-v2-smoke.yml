name: relay-native-binary-v2-smoke
on:
  push:
    branches: ['mchen/relay-native-binary-v2']

concurrency:
  group: relay-native-v2-${{ github.sha }}
  cancel-in-progress: true

env:
  SNUBA_NO_WORKERS: 1

jobs:
  smoke-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      XDIST_PER_WORKER_SNUBA: '1'
      XDIST_WORKERS: '2'
      PYTHONHASHSEED: '0'

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup sentry env (Full Snuba stack)
        uses: ./.github/actions/setup-sentry
        id: setup
        with:
          mode: backend-ci

      - name: Extract Relay binary from Docker image
        run: |
          echo "=== Extracting Relay binary from Docker image ==="
          # Use the same image that devservices started for relay
          RELAY_IMAGE="${RELAY_TEST_IMAGE:-ghcr.io/getsentry/relay:nightly}"
          echo "Image: $RELAY_IMAGE"

          docker create --name relay_extract "$RELAY_IMAGE"
          for bin_path in /bin/relay /usr/local/bin/relay /usr/bin/relay; do
            if docker cp "relay_extract:${bin_path}" /tmp/relay 2>/dev/null; then
              echo "Found binary at $bin_path"
              break
            fi
          done
          docker rm relay_extract

          chmod +x /tmp/relay
          echo "Size: $(du -h /tmp/relay | cut -f1)"
          /tmp/relay --version
          echo "RELAY_NATIVE_BIN=/tmp/relay" >> "$GITHUB_ENV"

      - name: Verify processing support
        run: |
          TEST_DIR=$(mktemp -d)
          cat > "$TEST_DIR/config.yml" <<'CONF'
          relay:
            mode: managed
            upstream: http://127.0.0.1:9999/
            host: 0.0.0.0
            port: 44444
          processing:
            enabled: true
            kafka_config:
              - {name: 'bootstrap.servers', value: '127.0.0.1:9092'}
            topics:
              events: test-events
            redis: redis://127.0.0.1:6379/0
          CONF
          cat > "$TEST_DIR/credentials.json" <<'CRED'
          {"secret_key":"OxE6Du8quMxWj19f7YDCpIxm6XyU9nWGQJkMWFlkchA","public_key":"SMSesqan65THCV6M4qs4kBzPai60LzuDn-xNsvYpuP8","id":"88888888-4444-4444-8444-cccccccccccc"}
          CRED
          timeout 3 /tmp/relay run --config "$TEST_DIR" 2>&1 | head -20 || true
          echo "Processing support OK"
          rm -rf "$TEST_DIR"

      - name: Create per-worker ClickHouse databases and Snuba instances
        run: |
          SNUBA_IMAGE=$(docker inspect snuba-snuba-1 --format '{{.Config.Image}}')
          SNUBA_NETWORK=$(docker inspect snuba-snuba-1 --format '{{range $k, $v := .NetworkSettings.Networks}}{{$k}}{{end}}')

          for i in $(seq 0 $(($XDIST_WORKERS - 1))); do
            WORKER_DB="default_gw${i}"
            WORKER_PORT=$((1230 + i))
            echo "=== Worker gw${i}: db=$WORKER_DB, port=$WORKER_PORT ==="

            curl -s 'http://localhost:8123/' --data-binary "CREATE DATABASE IF NOT EXISTS ${WORKER_DB}"

            docker run --rm \
              --network "$SNUBA_NETWORK" \
              -e "CLICKHOUSE_DATABASE=${WORKER_DB}" \
              -e "CLICKHOUSE_HOST=clickhouse" -e "CLICKHOUSE_PORT=9000" \
              -e "DEFAULT_BROKERS=kafka:9093" \
              -e "REDIS_HOST=redis" -e "REDIS_PORT=6379" -e "REDIS_DB=1" \
              -e "SNUBA_SETTINGS=docker" \
              "$SNUBA_IMAGE" bootstrap --force 2>&1 | tail -3

            docker run -d \
              --name "snuba-gw${i}" \
              --network "$SNUBA_NETWORK" \
              -p "${WORKER_PORT}:1218" \
              -e "CLICKHOUSE_DATABASE=${WORKER_DB}" \
              -e "CLICKHOUSE_HOST=clickhouse" -e "CLICKHOUSE_PORT=9000" \
              -e "DEFAULT_BROKERS=kafka:9093" \
              -e "REDIS_HOST=redis" -e "REDIS_PORT=6379" -e "REDIS_DB=1" \
              -e "SNUBA_SETTINGS=docker" \
              "$SNUBA_IMAGE" api
          done

          for i in $(seq 0 $(($XDIST_WORKERS - 1))); do
            WORKER_PORT=$((1230 + i))
            for attempt in $(seq 1 30); do
              if curl -sf "http://localhost:${WORKER_PORT}/health" > /dev/null 2>&1; then
                echo "snuba-gw${i} ready"; break
              fi
              sleep 1
            done
          done

      - name: Run smoke test (native binary relay, 4 tests, -n 2)
        run: |
          echo "RELAY_NATIVE_BIN=$RELAY_NATIVE_BIN"
          py.test tests/relay_integration/test_message_filters.py \
            -n "$XDIST_WORKERS" \
            -k "test_filters_are_applied_browser_extension or test_filters_ensure_disabled_not_applied or test_filters_are_applied_legacy_browsers or test_filter_web_crawlers" \
            --dist=loadfile -x -vvv 2>&1 | tail -80

      - name: Inspect failure
        if: failure()
        run: |
          docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          echo ""
          /tmp/relay --version 2>&1 || echo "binary not found"
