# Add a GitHub Check to commits in "master" that specifies the "type" of files that were changed
# ex: "only frontend", "only backed", or "fullstack"
name: meta(deploy)

on:
  push:
    branches:
      - master

jobs:
  files-changed:
    name: detect what files changed
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Check for file changes
        uses: dorny/paths-filter@0bc4621a3135347011ad047f9ecf449bf72ce2bd # v3.0.0
        id: changes
        with:
          list-files: shell
          token: ${{ github.token }}
          filters: .github/file-filters.yml

      - name: Create GitHub job
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const { updateChangeType } = await import(`${process.env.GITHUB_WORKSPACE}/.github/workflows/scripts/deploy.js`);
            await updateChangeType({
              github,
              context,
              fileChanges: ${{ toJson(steps.changes.outputs) }}
            });
