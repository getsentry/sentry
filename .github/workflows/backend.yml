name: backend

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

# Cancel in progress workflows on pull_requests.
# https://docs.github.com/en/actions/using-jobs/using-concurrency#example-using-a-fallback-value
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  files-changed:
    name: detect what files changed
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    outputs:
      backend: ${{ steps.changes.outputs.backend_all }}
      changed-files: ${{ steps.changed-files.outputs.files }}
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          fetch-depth: 0

      - name: Check for backend file changes
        uses: dorny/paths-filter@0bc4621a3135347011ad047f9ecf449bf72ce2bd # v3.0.0
        id: changes
        with:
          token: ${{ github.token }}
          filters: .github/file-filters.yml

      - name: Get changed files
        id: changed-files
        if: github.event_name == 'pull_request'
        run: |
          CHANGED=$(git diff --name-only \
            "${{ github.event.pull_request.base.sha }}"..."${{ github.event.pull_request.head.sha }}" \
            | tr '\n' ' ')
          echo "files=$CHANGED" >> "$GITHUB_OUTPUT"

  select-sentry-tests:
    if: >-
      needs.files-changed.outputs.backend == 'true' &&
      github.event_name == 'pull_request'
    needs: files-changed
    uses: getsentry/getsentry/.github/workflows/select-sentry-tests.yml@ci-generate-cross-repo-coverage
    with:
      sentry-changed-files: ${{ needs.files-changed.outputs.changed-files }}
    secrets: inherit

  print-results:
    if: always() && !cancelled()
    needs: [files-changed, select-sentry-tests]
    name: print selective test results
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Print outputs
        run: |
          echo "=== select-sentry-tests outputs ==="
          echo "has-selected-tests: ${{ needs.select-sentry-tests.outputs.has-selected-tests }}"
          echo "test-count: ${{ needs.select-sentry-tests.outputs.test-count }}"

      - name: Download selected tests artifact
        if: needs.select-sentry-tests.outputs.has-selected-tests == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: selected-tests-${{ github.run_id }}
          path: .artifacts/

      - name: Print selected tests
        if: needs.select-sentry-tests.outputs.has-selected-tests == 'true'
        run: |
          echo "=== Selected test files ==="
          cat .artifacts/selected-tests.txt
          echo ""
          echo "=== Line count ==="
          wc -l .artifacts/selected-tests.txt
