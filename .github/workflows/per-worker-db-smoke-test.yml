name: '[POC] per-worker DB smoke test'

on:
  workflow_dispatch:
  push:
    branches:
      - mchen/per-worker-snuba-db

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: 3
  SNUBA_NO_WORKERS: 1

jobs:
  smoke-test:
    name: 'per-worker-db smoke test'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write

    env:
      PYTHONHASHSEED: '0'
      XDIST_PER_WORKER_SNUBA: '1'
      XDIST_WORKERS: '2'

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup sentry env (Full Snuba stack)
        uses: ./.github/actions/setup-sentry
        id: setup
        with:
          mode: backend-ci

      - name: Create per-worker ClickHouse databases and Snuba instances
        run: |
          XDIST_N=${XDIST_WORKERS:-2}
          echo "Setting up $XDIST_N per-worker ClickHouse databases + Snuba instances"

          SNUBA_IMAGE=$(docker inspect snuba-snuba-1 --format '{{.Config.Image}}')
          SNUBA_NETWORK=$(docker inspect snuba-snuba-1 --format '{{range $k, $v := .NetworkSettings.Networks}}{{$k}}{{end}}')
          echo "Snuba image: $SNUBA_IMAGE"
          echo "Snuba network: $SNUBA_NETWORK"

          BASE_DB="default"
          BASE_COUNT=$(curl -s 'http://localhost:8123/' --data-binary \
            "SELECT count() FROM system.tables WHERE database = '${BASE_DB}'" | tr -d '\n')
          echo "Base database has $BASE_COUNT tables"

          for i in $(seq 0 $((XDIST_N - 1))); do
            WORKER_DB="default_gw${i}"
            WORKER_PORT=$((1230 + i))
            echo ""
            echo "=== Worker gw${i}: database=$WORKER_DB, port=$WORKER_PORT ==="

            # Create worker database
            curl -s 'http://localhost:8123/' --data-binary "CREATE DATABASE IF NOT EXISTS ${WORKER_DB}"

            # Use Snuba's bootstrap to create all tables (including materialized views)
            # in the per-worker database. This is the same mechanism that creates the
            # initial tables in the default database during devservices setup.
            echo "  Running Snuba bootstrap for $WORKER_DB..."
            docker run --rm \
              --network "$SNUBA_NETWORK" \
              -e "CLICKHOUSE_DATABASE=${WORKER_DB}" \
              -e "CLICKHOUSE_HOST=clickhouse" \
              -e "CLICKHOUSE_PORT=9000" \
              -e "CLICKHOUSE_HTTP_PORT=8123" \
              -e "DEFAULT_BROKERS=kafka:9093" \
              -e "REDIS_HOST=redis" \
              -e "REDIS_PORT=6379" \
              -e "REDIS_DB=1" \
              -e "SNUBA_SETTINGS=docker" \
              "$SNUBA_IMAGE" bootstrap --force 2>&1 | tail -5
            echo "  Bootstrap complete"

            # Verify table count
            W_COUNT=$(curl -s 'http://localhost:8123/' --data-binary \
              "SELECT count() FROM system.tables WHERE database = '${WORKER_DB}'" | tr -d '\n')
            echo "  $WORKER_DB: $W_COUNT tables (base has $BASE_COUNT)"

            # Start Snuba API container for this worker
            docker run -d \
              --name "snuba-gw${i}" \
              --network "$SNUBA_NETWORK" \
              -p "${WORKER_PORT}:1218" \
              -e "CLICKHOUSE_DATABASE=${WORKER_DB}" \
              -e "CLICKHOUSE_HOST=clickhouse" \
              -e "CLICKHOUSE_PORT=9000" \
              -e "CLICKHOUSE_HTTP_PORT=8123" \
              -e "DEFAULT_BROKERS=kafka:9093" \
              -e "REDIS_HOST=redis" \
              -e "REDIS_PORT=6379" \
              -e "REDIS_DB=1" \
              -e "SNUBA_SETTINGS=docker" \
              -e "DEBUG=1" \
              "$SNUBA_IMAGE" api
            echo "  Started snuba-gw${i} on port $WORKER_PORT"
          done

          echo ""
          echo "Waiting for per-worker Snuba instances..."
          for i in $(seq 0 $((XDIST_N - 1))); do
            WORKER_PORT=$((1230 + i))
            for attempt in $(seq 1 30); do
              if curl -sf "http://localhost:${WORKER_PORT}/health" > /dev/null 2>&1; then
                echo "  snuba-gw${i} ready"
                break
              fi
              [ "$attempt" -eq 30 ] && { echo "FAIL: snuba-gw${i}"; docker logs "snuba-gw${i}" 2>&1 | tail -20; exit 1; }
              sleep 1
            done
          done
          echo "All per-worker Snuba instances ready!"

      - name: Debug - verify routing
        run: |
          echo "=== Verifying per-worker Snuba routing ==="
          echo "Default Snuba (port 1218):"
          curl -s 'http://localhost:1218/health' && echo " OK" || echo " FAIL"
          echo "Per-worker Snuba gw0 (port 1230):"
          curl -s 'http://localhost:1230/health' && echo " OK" || echo " FAIL"
          echo "Per-worker Snuba gw1 (port 1231):"
          curl -s 'http://localhost:1231/health' && echo " OK" || echo " FAIL"

          echo ""
          echo "=== ClickHouse databases ==="
          curl -s 'http://localhost:8123/' --data-binary "SHOW DATABASES" | grep -E "default|gw"

          echo ""
          echo "=== Table count per database ==="
          for db in default default_gw0 default_gw1; do
            count=$(curl -s 'http://localhost:8123/' --data-binary "SELECT count() FROM system.tables WHERE database = '$db'" | tr -d '\n')
            echo "  $db: $count tables"
          done

      - name: Run smoke tests (small Snuba test file under xdist -n 2)
        run: |
          echo "=== Smoke test: Snuba discover tests ==="
          echo "Verifying per-worker database routing with xdist -n 2"
          echo ""
          python3 -b -m pytest \
            tests/sentry/snuba/test_discover_query.py \
            -k "test_field_aliasing_in_selected_columns or test_field_alias_orderby or test_simple_paginator" \
            --reuse-db \
            -n 2 \
            --dist=loadfile \
            -v \
            --tb=short \
            -s

      - name: Inspect failure
        if: always()
        run: |
          echo "=== Worker routing diagnostics ==="
          for f in /tmp/xdist-snuba-gw*.log; do
            if [ -f "$f" ]; then
              echo "--- $f ---"
              cat "$f"
              echo ""
            fi
          done
          [ ! -f /tmp/xdist-snuba-gw0.log ] && echo "  NO diagnostic files found (session fixture may not have run)"

          echo ""
          echo "=== Per-worker Snuba container logs ==="
          for name in $(docker ps -a --filter "name=snuba-gw" --format '{{.Names}}'); do
            echo "--- $name ---"
            docker logs "$name" 2>&1 | tail -20
          done

          echo ""
          echo "=== ClickHouse data check (row counts per database) ==="
          for db in default default_gw0 default_gw1; do
            echo "--- $db ---"
            curl -s 'http://localhost:8123/' --data-binary \
              "SELECT name, total_rows FROM system.tables WHERE database = '${db}' AND total_rows > 0 ORDER BY name FORMAT TabSeparatedWithNames" 2>/dev/null || echo "  (query failed)"
          done
