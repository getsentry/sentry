name: 'Sync product area labels from Linear'

on:
  schedule:
    - cron: '0 6 * * *' # daily at 6am UTC
  workflow_dispatch:

env:
  LINEAR_LABEL_GROUP_ID: 'b6d47ae3-c30a-41de-be81-8510de561dad'
  PR_ASSIGNEE: 'gaprl'

jobs:
  sync:
    name: Sync labels
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch labels from Linear
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          cat > /tmp/linear-query.json << JSONEOF
          {"query": "query(\$groupId: ID!) { issueLabels(filter: { parent: { id: { eq: \$groupId } } }) { nodes { name } } }", "variables": {"groupId": "$LINEAR_LABEL_GROUP_ID"}}
          JSONEOF

          RESPONSE=$(curl -s -f https://api.linear.app/graphql \
            -H "Content-Type: application/json" \
            -H "Authorization: $LINEAR_API_KEY" \
            -d @/tmp/linear-query.json)

          LABELS=$(echo "$RESPONSE" | jq -r '.data.issueLabels.nodes[].name')
          if [ -z "$LABELS" ]; then
            echo "No labels found in Linear label group"
            exit 1
          fi

          echo "Found labels:"
          echo "$LABELS"
          echo "$LABELS" > /tmp/linear-labels.txt

      - name: Update issue templates
        run: |
          BEGIN='        # begin product areas - autogenerated by bin/sync-linear-labels.py'
          END='        # end product areas'

          # Build the new area options block
          AREA_LINES="$BEGIN"
          while IFS= read -r label; do
            if echo "$label" | grep -q "'"; then
              AREA_LINES="$AREA_LINES
                  - \"$label\""
            else
              AREA_LINES="$AREA_LINES
                  - '$label'"
            fi
          done < /tmp/linear-labels.txt
          AREA_LINES="$AREA_LINES
          $END"

          for template in bug feature support; do
            FILE=".github/ISSUE_TEMPLATE/${template}.yml"
            awk -v begin="$BEGIN" -v end="$END" -v areas="$AREA_LINES" '
              $0 == begin { print areas; skip=1; next }
              $0 == end { skip=0; next }
              skip { next }
              { print }
            ' "$FILE" > "${FILE}.tmp" && mv "${FILE}.tmp" "$FILE"
            echo "Updated $FILE"
          done

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="automation/sync-linear-labels"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add .github/ISSUE_TEMPLATE/
          git commit -m "chore: sync product area labels from Linear"
          git push --force origin "$BRANCH"
          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --title "chore: sync product area labels from Linear" \
              --body "Automated sync of product area labels from the Linear 'Area' label group to issue templates." \
              --assignee "$PR_ASSIGNEE"
          fi
