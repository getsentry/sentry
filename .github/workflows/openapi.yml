name: openapi
on:
  push:
    branches:
      - master

# hack for https://github.com/actions/cache/issues/810#issuecomment-1222550359
env:
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: 3

jobs:
  build_and_deref_json:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: github app token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ vars.SENTRY_API_SCHEMA_UPDATER_APP_CLIENT_ID }}
          private-key: ${{ secrets.SENTRY_API_SCHEMA_UPDATER_PRIVATE_KEY }}
          repositories: |
            sentry
            sentry-api-schema

      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Check for python file changes
        uses: dorny/paths-filter@0bc4621a3135347011ad047f9ecf449bf72ce2bd # v3.0.0
        id: changes
        with:
          token: ${{ github.token }}
          filters: .github/file-filters.yml

      - name: Start devservices early
        uses: ./.github/actions/setup-devservices
        if: steps.changes.outputs.api_docs == 'true'
        with:
          mode: migrations

      - name: Setup sentry env
        uses: ./.github/actions/setup-sentry
        with:
          mode: migrations
          skip-devservices: 'true'
        if: steps.changes.outputs.api_docs == 'true'

      - name: Wait for devservices
        if: steps.changes.outputs.api_docs == 'true'
        run: |
          sentry init
          ./.github/actions/setup-devservices/wait.sh

      - name: Checkout getsentry/sentry-api-schema
        if: steps.changes.outputs.api_docs == 'true'
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          ref: 'main'
          repository: getsentry/sentry-api-schema
          path: sentry-api-schema
          # using app token so that `Git Commit & Push` step has the right permissions
          # https://github.com/stefanzweifel/git-auto-commit-action/tree/master?tab=readme-ov-file#push-to-protected-branches
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4
        if: steps.changes.outputs.api_docs == 'true'
        id: setup-node
        with:
          node-version-file: '.node-version'

      - uses: pnpm/action-setup@9b5745cdf0a2e8c2620f0746130f809adb911c19 # v4
      - name: Build OpenAPI Derefed JSON
        if: steps.changes.outputs.api_docs == 'true'
        run: |
          make build-api-docs

      - name: Build RPC method schema
        if: steps.changes.outputs.api_docs == 'true'
        run: |
          sentry rpcschema > rpc_method_schema.json

      - name: Copy artifacts into getsentry/sentry-api-schema
        if: steps.changes.outputs.api_docs == 'true'
        run: |
          cp tests/apidocs/openapi-derefed.json sentry-api-schema
          cp src/sentry/apidocs/api_ownership_stats_dont_modify.json sentry-api-schema
          cp rpc_method_schema.json sentry-api-schema

      - name: Git Commit & Push
        uses: stefanzweifel/git-auto-commit-action@0049e3fa4059ca715255fbbcb7dea4516f02ce0a # v4.15.3
        if: steps.changes.outputs.api_docs == 'true'
        with:
          repository: sentry-api-schema
          branch: main
          commit_message: Generated
          commit_user_email: 271575301+sentry-api-schema-updater[bot]@users.noreply.github.com
          commit_user_name: sentry-api-schema-updater[bot]
