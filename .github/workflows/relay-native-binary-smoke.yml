name: '[POC] relay native binary smoke test'

on:
  workflow_dispatch:
  push:
    branches:
      - mchen/relay-native-binary

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: 3
  RELAY_NATIVE_BIN: /tmp/relay

jobs:
  relay-native-binary-test:
    name: relay_integration (native binary)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Download Relay binary
        run: |
          RELAY_VERSION="latest"
          RELAY_URL="https://github.com/getsentry/relay/releases/latest/download/relay-Linux-x86_64"
          echo "Downloading Relay binary from $RELAY_URL"
          curl -L -o /tmp/relay "$RELAY_URL"
          chmod +x /tmp/relay
          /tmp/relay --version

      - name: Setup sentry env (Full Snuba stack)
        uses: ./.github/actions/setup-sentry
        id: setup
        with:
          mode: backend-ci

      - name: Test Relay binary manually
        run: |
          echo "=== Testing Relay binary ==="
          /tmp/relay --version
          echo ""

          # Create a minimal test config
          TEST_DIR=$(mktemp -d)
          cat > "$TEST_DIR/config.yml" <<'CONF'
          relay:
            mode: managed
            upstream: http://127.0.0.1:8000/
            host: 0.0.0.0
            port: 44444
          logging:
            level: INFO
          limits:
            shutdown_timeout: 0
          processing:
            enabled: true
            kafka_config:
              - {name: 'bootstrap.servers', value: '127.0.0.1:9092'}
            topics:
              events: ingest-events
              attachments: ingest-events
              transactions: ingest-events
              outcomes: outcomes
            redis: redis://127.0.0.1:6379/0
          CONF

          # Generate credentials
          /tmp/relay -c "$TEST_DIR" credentials generate 2>&1 || echo "credentials generate failed"
          ls -la "$TEST_DIR/"
          cat "$TEST_DIR/config.yml"

          echo ""
          echo "=== Attempting to start Relay (5s timeout) ==="
          timeout 5 /tmp/relay -c "$TEST_DIR" run 2>&1 || echo "Exit code: $?"
          echo ""
          echo "=== Manual test complete ==="

      - name: Run relay_integration tests (native binary)
        run: |
          echo "=== Relay Native Binary Smoke Test ==="
          echo "RELAY_NATIVE_BIN=$RELAY_NATIVE_BIN"
          echo "Running relay_integration tests with native binary instead of Docker container"
          python3 -b -m pytest \
            tests/relay_integration \
            --reuse-db \
            --durations=0 \
            --json-report \
            --json-report-file=".artifacts/pytest.json" \
            --json-report-omit=log \
            --junit-xml=".artifacts/pytest.junit.xml" \
            -o junit_suite_name=pytest-relay-native-binary

      - name: Inspect failure
        if: always()
        run: |
          echo "=== Relay config files in /tmp ==="
          find /tmp -name "config.yml" -path "*relay*" 2>/dev/null | head -5 | while read f; do
            echo "--- $f ---"
            cat "$f"
            echo ""
          done

          echo "=== Relay log files in /tmp ==="
          find /tmp -name "relay-*.log" 2>/dev/null | head -10 | while read f; do
            echo "--- $f ---"
            cat "$f"
            echo ""
          done

          if command -v devservices; then
            devservices logs 2>&1 | tail -30
          fi
