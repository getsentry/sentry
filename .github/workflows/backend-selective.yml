# Parallel validation workflow: runs sentry backend tests using getsentry's
# cross-repo coverage DB for selective test selection. Runs alongside the
# existing backend.yml — not required for merge.
#
# Once validated, this will replace prepare-selective-tests in backend.yml.
name: backend (NOT REQUIRED - selective via getsentry)

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

# Cancel in progress workflows on pull_requests.
# https://docs.github.com/en/actions/using-jobs/using-concurrency#example-using-a-fallback-value
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# hack for https://github.com/actions/cache/issues/810#issuecomment-1222550359
env:
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: 3
  SNUBA_NO_WORKERS: 1
  SENTRY_SKIP_SELENIUM_PLUGIN: '1'

permissions:
  contents: read
  id-token: write
  actions: read

jobs:
  files-changed:
    name: detect what files changed
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    outputs:
      backend: ${{ steps.changes.outputs.backend_all_without_acceptance }}
      skip_selective_testing: "${{ contains(github.event.pull_request.labels.*.name, 'Trigger: Override Selective Testing') }}"
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Check for backend file changes
        uses: dorny/paths-filter@0bc4621a3135347011ad047f9ecf449bf72ce2bd # v3.0.0
        id: changes
        with:
          token: ${{ github.token }}
          filters: .github/file-filters.yml

  select-tests:
    if: >-
      needs.files-changed.outputs.backend == 'true' &&
      needs.files-changed.outputs.skip_selective_testing != 'true' &&
      github.event.pull_request.head.repo.full_name == github.repository
    needs: files-changed
    name: select tests via getsentry coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    outputs:
      has-selected-tests: ${{ steps.results.outputs.has-selected-tests }}
      test-count: ${{ steps.results.outputs.test-count }}
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED_FILES=$(git diff --name-only "$BASE_SHA"..."$HEAD_SHA" | tr '\n' ' ')
          echo "Changed files: $CHANGED_FILES"
          echo "files=$CHANGED_FILES" >> "$GITHUB_OUTPUT"

      - name: getsentry token
        id: getsentry
        uses: getsentry/action-github-app-token@d4b5da6c5e37703f8c3b3e43abb5705b46e159cc # v3.0.0
        with:
          app_id: ${{ vars.SENTRY_INTERNAL_APP_ID }}
          private_key: ${{ secrets.SENTRY_INTERNAL_APP_PRIVATE_KEY }}

      - name: Dispatch and wait for getsentry test selection
        id: dispatch
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        with:
          github-token: ${{ steps.getsentry.outputs.token }}
          script: |
            const owner = 'getsentry';
            const repo = 'getsentry';
            const workflow_id = 'select-sentry-tests.yml';

            const before = new Date();
            before.setSeconds(before.getSeconds() - 5);

            await github.rest.actions.createWorkflowDispatch({
              owner, repo, workflow_id,
              ref: 'master',
              inputs: { 'sentry-changed-files': process.env.CHANGED_FILES },
            });
            core.info('Dispatched select-sentry-tests.yml to getsentry');

            // Find the dispatched run
            let runId;
            for (let i = 0; i < 30; i++) {
              await new Promise(r => setTimeout(r, 2000));
              const { data: { workflow_runs } } = await github.rest.actions.listWorkflowRuns({
                owner, repo, workflow_id,
                event: 'workflow_dispatch',
                created: `>=${before.toISOString()}`,
                per_page: 5,
              });
              if (workflow_runs.length > 0) {
                runId = workflow_runs[0].id;
                break;
              }
            }
            if (!runId) throw new Error('Could not find dispatched workflow run');
            core.info(`Found getsentry run: ${runId}`);

            // Wait for completion (up to 10 minutes)
            for (let i = 0; i < 60; i++) {
              await new Promise(r => setTimeout(r, 10000));
              const { data: run } = await github.rest.actions.getWorkflowRun({
                owner, repo, run_id: runId,
              });
              core.info(`Run status: ${run.status}`);
              if (run.status === 'completed') {
                if (run.conclusion !== 'success') {
                  core.warning(`Getsentry run concluded with: ${run.conclusion}`);
                }
                core.setOutput('run-id', String(runId));
                core.setOutput('conclusion', run.conclusion);
                return;
              }
            }
            throw new Error('Timed out waiting for getsentry workflow');

      - name: Download selected tests from getsentry
        if: steps.dispatch.outputs.conclusion == 'success'
        id: download
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: selected-tests
          repository: getsentry/getsentry
          run-id: ${{ steps.dispatch.outputs.run-id }}
          github-token: ${{ steps.getsentry.outputs.token }}
          path: .artifacts/

      - name: Re-upload selected tests for downstream jobs
        if: steps.download.outcome == 'success'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: selected-tests-${{ github.run_id }}
          path: .artifacts/selected-tests.txt
          retention-days: 1

      - name: Parse results
        id: results
        run: |
          if [[ "${{ steps.download.outcome }}" == "success" && -f .artifacts/selected-tests.txt ]]; then
            count=$(wc -l < .artifacts/selected-tests.txt | tr -d ' ')
            echo "has-selected-tests=true" >> "$GITHUB_OUTPUT"
            echo "test-count=${count}" >> "$GITHUB_OUTPUT"
          else
            echo "has-selected-tests=false" >> "$GITHUB_OUTPUT"
            echo "test-count=" >> "$GITHUB_OUTPUT"
          fi

  calculate-shards:
    if: >-
      always() &&
      !cancelled() &&
      needs.files-changed.outputs.backend == 'true' &&
      needs.files-changed.outputs.skip_selective_testing != 'true'
    needs: [files-changed, select-tests]
    name: calculate test shards (selective)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      shard-count: ${{ steps.calculate-shards.outputs.shard-count }}
      shard-indices: ${{ steps.calculate-shards.outputs.shard-indices }}
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup sentry env
        uses: ./.github/actions/setup-sentry
        id: setup
        with:
          mode: backend-ci
          skip-devservices: true

      - name: Download selected tests artifact
        if: needs.select-tests.outputs.has-selected-tests == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: selected-tests-${{ github.run_id }}
          path: .artifacts/

      - name: Calculate test shards
        id: calculate-shards
        env:
          SELECTED_TESTS_FILE: ${{ needs.select-tests.outputs.has-selected-tests == 'true' && '.artifacts/selected-tests.txt' || '' }}
          SELECTED_TEST_COUNT: ${{ needs.select-tests.outputs.test-count || '' }}
        run: |
          python3 .github/workflows/scripts/calculate-backend-test-shards.py

  backend-test:
    if: >-
      always() &&
      !cancelled() &&
      needs.files-changed.outputs.backend == 'true' &&
      needs.files-changed.outputs.skip_selective_testing != 'true' &&
      needs.calculate-shards.result == 'success' &&
      needs.calculate-shards.outputs.shard-count != '0'
    needs: [files-changed, select-tests, calculate-shards]
    name: backend test (selective)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        instance: ${{ fromJSON(needs.calculate-shards.outputs.shard-indices) }}
    env:
      MATRIX_INSTANCE_TOTAL: ${{ needs.calculate-shards.outputs.shard-count }}
      TEST_GROUP_STRATEGY: roundrobin
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup sentry env
        uses: ./.github/actions/setup-sentry
        id: setup
        with:
          mode: backend-ci

      - name: Download odiff binary
        run: |
          curl -sL https://registry.npmjs.org/odiff-bin/-/odiff-bin-4.3.2.tgz \
            | tar -xz --strip-components=2 package/raw_binaries/odiff-linux-x64
          sudo install -m 755 odiff-linux-x64 /usr/local/bin/odiff
          rm odiff-linux-x64

      - name: Download selected tests artifact
        if: needs.select-tests.outputs.has-selected-tests == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: selected-tests-${{ github.run_id }}
          path: .artifacts/

      - name: Run backend test (${{ steps.setup.outputs.matrix-instance-number }} of ${{ steps.setup.outputs.matrix-instance-total }})
        env:
          SELECTED_TESTS_FILE: ${{ needs.select-tests.outputs.has-selected-tests == 'true' && '.artifacts/selected-tests.txt' || '' }}
        run: |
          make test-python-ci

      - name: Inspect failure
        if: failure()
        run: |
          if command -v devservices; then
            devservices logs
          fi
