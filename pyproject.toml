    "tests.sentry.api.helpers.test_group_index",
    "tests.sentry.issues.test_utils",
]
disable_error_code = [
    "arg-type",
    "assignment",
    "attr-defined",
    "call-overload",
    "misc",
    "override",
    "union-attr",
]
# end: sentry modules with typing issues

