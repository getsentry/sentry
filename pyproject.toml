[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.format]
# Use black-compatible defaults
quote-style = "double"
indent-style = "space"

[tool.ruff.lint]
select = [
  "E", # pycodestyle errors
  "W", # pycodestyle warnings
  "F", # pyflakes
  "B", # flake8-bugbear
  "LOG", # flake8-logging
  "I", # isort
  "T20", # flake8-print (replaces S002)
  "UP", # pyupgrade
]
ignore = [
  "E203", # whitespace before ':' (black compatibility)
  "E402", # module level import not at top of file
  "E501", # line too long (formatter handles this)
  "E731", # do not assign a lambda expression
  "B007", # unused loop control variable
  "B009", # do not call getattr with a constant attribute value
  "B010", # do not call setattr with a constant attribute value
  "B011", # do not call assert False (we don't use PYTHONOPTIMIZE)
  "B017", # assert-raises-exception (not enforced before)
  "B018", # useless-expression (not enforced before)
  "B020", # loop variable overwritten by assignment target
  "B023", # function definition does not bind loop variable
  "B024", # abstract base class with no abstract methods
  "B026", # star-arg unpacking after a keyword argument
  "B027", # empty method in abstract base class
  "B904", # raise-without-from-inside-except (not enforced before)
  "B905", # zip-without-explicit-strict (not enforced before)
  "B911", # itertools.batched without strict (not enforced before)
  "B028", # no explicit stacklevel in warnings (not enforced before)
  "B033", # duplicate set items (not enforced before)
  "B039", # mutable ContextVar default (not enforced before)
  # --- flake8-logging rules not previously enforced ---
  "LOG014", # exc-info-outside-except-handler
  "LOG015", # root-logger-call
  # --- pyupgrade rules to ignore for now ---
  "UP007", # use X | Y for union types (fix in future PR)
  "UP017", # datetime-utc-alias
  "UP031", # printf-string-formatting (fix with f-strings in future PR)
  "UP035", # deprecated typing imports (fix in future PR)
  "UP040", # use type keyword instead of TypeAlias (fix in future PR)
  "UP045", # use X | None instead of Optional (fix in future PR)
  "UP046", # non-pep695-generic-class (PEP 695 migration is a larger effort)
  "UP047", # non-pep695-generic-function (PEP 695 migration is a larger effort)
]

[tool.ruff.lint.per-file-ignores]
# Allow print statements in specific files (matches S002 ignores)
".github/*" = ["T20"]
"devenv/*.py" = ["T20"]
"src/sentry/build/*" = ["T20"]
"tools/*" = ["T20"]
"src/flagpole/*" = ["T20"]
"**/migrations/*" = ["I"]

[tool.ruff.lint.isort]
known-first-party = ["sentry"]

[tool.pytest.ini_options]
python_files = "test_*.py sentry/testutils/*"
# note: When updating the traceback format, make sure to update .github/pytest.json
addopts = "--tb=short --nomigrations"
# TODO: --import-mode=importlib will become the default soon,
# currently we have a few relative imports that don't work with that.
markers = [
  "snuba: test requires access to snuba",
  "snuba_ci: test is run in snuba ci",
  "sentry_metrics: test requires access to sentry metrics",
  "symbolicator: test requires access to symbolicator",
  "querybuilder: smoke tests for QueryBuilders",
  "thread_leak_allowlist: temporarily allow known-issue thread leaks",
]
filterwarnings = [
  # Consider all warnings to be errors other than the ignored ones.
  "error",

  # TODO: we should fix these, but for now there's a lot
  "ignore:datetime.datetime.utcfromtimestamp\\(\\) is deprecated.*",
  "ignore:datetime.datetime.utcnow\\(\\) is deprecated.*",

  # The following warning filters are for pytest only.
  "ignore:.*sentry.digests.backends.dummy.DummyBackend.*:sentry.utils.warnings.UnsupportedBackend",

  # pytest has not yet implemented the replacement for this yet
  "ignore:The --looponfail command line argument.*",

  # `ATTRIBUTE_NAMES` is a constant from the `sentry-conventions` library.
  # We don't want to immediately block any sentry-conventions library updates
  # with errors on new deprecations, and some code may depend on the value of
  # a deprecated constant. But, still report it as a warning so that we're
  # informed and can evaluate.
  "default:ATTRIBUTE_NAMES\\..* is deprecated.*:DeprecationWarning",

  # PyJWT 2.12.0 introduced InsecureKeyLengthWarning for HMAC keys shorter than
  # 32 bytes. Tests use short secrets intentionally; production secrets are long enough.
  "ignore:.*HMAC key.*below the minimum recommended length.*:jwt.warnings.InsecureKeyLengthWarning",
]
looponfailroots = ["src", "tests"]

[tool.mypy]
python_version = "3.13"
mypy_path = ["fixtures/stubs-for-mypy"]
plugins = ["pydantic.mypy", "mypy_django_plugin.main", "tools.mypy_helpers.plugin"]
files = ["."]
exclude = ["^.venv/", "^venv/", "^self-hosted/"]

# minimal strictness settings
check_untyped_defs = true
no_implicit_reexport = true
warn_unreachable = true
warn_unused_configs = true
warn_unused_ignores = true
warn_redundant_casts = true
enable_error_code = ["ignore-without-code", "redundant-self"]
local_partial_types = true # compat with dmypy
disallow_any_generics = true
disallow_untyped_defs = true
strict_equality = true

[tool.django-stubs]
django_settings_module = "sentry.conf.server_mypy"
strict_model_abstract_attrs = false

# these have py.typed but incorrect types
[[tool.mypy.overrides]]
module = [
  # TODO: these cause type errors when followed
  "snuba_sdk.*",
]
follow_imports = "skip"

# python3 -m tools.mypy_helpers.make_stub_ignores
# begin: missing 3rd party stubs
# - add .pyi files to fixtures/stubs-for-mypy
# - or find a 3rd party stub
[[tool.mypy.overrides]]
module = [
  "boto3.*",
  "botocore.client.*",
  "botocore.exceptions.*",
  "confluent_kafka.*",
  "cssselect.*",
  "django_zero_downtime_migrations.backends.postgres.schema.*",
  "fido2.*",
  "google.auth.*",
  "google.cloud.*",
  "google.resumable_media.common.*",
  "google.rpc.status_pb2.*",
  "google.type.*",
